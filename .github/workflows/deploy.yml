name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "==> Pulling latest code..."
            cd /opt/appcandidato

            # Remove only untracked source files (preserva uploads e .env)
            # Usando caminhos relativos e garantindo que o diretório de uploads não seja tocado
            git clean -fd -e "public/uploads/*" -e ".env"
            git pull origin main


            echo "==> Installing dependencies..."
            npm install

            echo "==> Generating Prisma Client..."
            npx prisma generate


            echo "==> Building application (clean build)..."
            rm -rf .next
            npm run build

            echo "==> Restarting PM2 (cleaning port 3000)..."
            pm2 stop app-candidato 2>/dev/null || true
            pm2 delete app-candidato 2>/dev/null || true
            # Mata qualquer processo zumbi na porta 3000 (comum em Next.js)
            sudo fuser -k 3000/tcp 2>/dev/null || true
            PORT=3000 pm2 start npm --name app-candidato -- run start
            pm2 save

            echo "==> Deploy concluido com sucesso!"
