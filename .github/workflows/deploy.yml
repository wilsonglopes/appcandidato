name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "==> Pulling latest code..."
            cd /opt/appcandidato

            # Remove only untracked source files (preserva uploads e .env)
            # Usando caminhos relativos e garantindo que o diretório de uploads não seja tocado
            git clean -fd -e "public/uploads/*" -e ".env"
            git pull origin main


            echo "==> Installing dependencies..."
            npm install

            echo "==> Generating Prisma Client & Syncing DB..."
            npx prisma generate
            npx prisma db push --accept-data-loss


            echo "==> Building application..."
            npm run build

            echo "==> Restarting PM2..."
            pm2 delete app-candidato 2>/dev/null || true
            PORT=3000 pm2 start npm --name app-candidato -- run start
            pm2 save

            echo "==> Deploy concluido com sucesso!"
